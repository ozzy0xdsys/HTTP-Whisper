name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-latest
          - name: Linux x86_64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Update Rust
        run: rustup update stable --no-self-update

      - name: Install Linux build libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libgl1-mesa-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Test
        run: cargo test --locked

      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item target/release/http-whisper.exe release/HTTP-Whisper.exe
          $hash = (Get-FileHash release/HTTP-Whisper.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  HTTP-Whisper.exe" | Set-Content -NoNewline release/HTTP-Whisper.exe.sha256

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p release/HTTP-Whisper-linux-x86_64
          install -m 755 target/release/http-whisper release/HTTP-Whisper-linux-x86_64/HTTP-Whisper
          install -m 644 README.md LICENSE release/HTTP-Whisper-linux-x86_64/
          tar -C release -czf release/HTTP-Whisper-linux-x86_64.tar.gz HTTP-Whisper-linux-x86_64
          rm -rf release/HTTP-Whisper-linux-x86_64
          cd release
          sha256sum HTTP-Whisper-linux-x86_64.tar.gz > HTTP-Whisper-linux-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "HTTP Whisper ${GITHUB_REF_NAME}" \
            --generate-notes
